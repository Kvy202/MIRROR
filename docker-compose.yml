# One-command local/prod-like stack: Mongo + the heartbeat server + the static
# client. Run with: SESSION_SECRET=$(openssl rand -base64 48) docker compose up --build
#
# IMPORTANT: MIRROR runs ONE authoritative game loop. Scale the server to exactly
# one instance. To fan out Socket.io across more instances you'd add the
# @socket.io/redis-adapter and keep the loop on a single leader — see the README.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo:27017/mirror
      CLIENT_ORIGIN: http://localhost:8081
      SESSION_SECRET: ${SESSION_SECRET:-mirror-dev-secret-change-me}
      MAX_VOTES_PER_IP: 5
    depends_on:
      - mongo
    ports:
      - "4001:4001"

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: http://localhost:4001
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8081:80"

volumes:
  mongo-data:
